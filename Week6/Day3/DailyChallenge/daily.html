<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Challenge: Currency Converter</title>
    <link rel="stylesheet" type="text/css" href="daily.css">
</head>
<body>
	<div class="wrapper">
        <form id="formElem">
            <label for="from">From:</label><br>
            <select name="from" id="from" required>
              <!--option value="volvo">Volvo</option-->
            </select><br><br>
            <label for="to">To:</label><br>
            <select name="to" id="to" required></select><br><br>
            <label for="amount">Amount:</label><br>
            <input type="text" id="amount" name="amount" required><br><br>
            <input type="submit" value="Convert" id="submit">
        </form>
    </div>

    <script type="text/javascript" src="daily.js"></script>
</body>
</html>
